<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>office-lab</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1><span id="heroMark" class="hero-mark">🐴</span> 직딩심체요절</h1>
        <p>10분만 딴짓해도 손해 계산은 정직하게.</p>
        <div class="hero-actions">
          <span id="globalLunchAlert" class="global-lunch-alert" hidden>점심시간 임박!!</span>
          <button id="setHomeGuideBtn" type="button" class="hero-home-btn">이 페이지를 홈으로 쓰기</button>
        </div>
      </div>
      <aside id="weatherWidget" class="weather-widget" aria-live="polite">
        <div class="weather-widget-text">
          <div class="weather-label">오늘 날씨</div>
          <div id="weatherSummary" class="weather-summary">위치 확인 중...</div>
          <div id="weatherUpdatedAt" class="weather-updated-at"></div>
        </div>
        <div class="weather-widget-visual">
          <img id="weatherIcon" class="weather-icon" alt="" />
          <div id="weatherTemp" class="weather-temp">--°</div>
          <button id="weatherRefreshBtn" type="button" class="weather-refresh-btn" aria-label="날씨 새로고침">↻</button>
        </div>
      </aside>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active tracker-tab-btn" data-tab="tracker" aria-label="슬기로운 월루생활" title="슬기로운 월루생활">
        <span class="tracker-tab-label tracker-tab-label-default">슬기로운</span>
        <span class="tracker-tab-label tracker-tab-label-hover">월루생활</span>
      </button>
      <button class="tab-btn" data-tab="income">실수령액표</button>
      <button class="tab-btn" data-tab="bookmarks">북마크</button>
      <button class="tab-btn" data-tab="todo">오늘 할 일</button>
      <button class="tab-btn" data-tab="lunch">점메추</button>
      <button class="tab-btn" data-tab="fortune">오늘의 운세</button>
      <button class="tab-btn" data-tab="ladder">사다리게임</button>
    </nav>

    <main id="tabHost" class="page"></main>
  </div>

  <div id="homeGuideModal" class="home-guide-modal" aria-hidden="true">
    <div class="home-guide-panel">
      <button id="homeGuideCloseBtn" type="button" class="btn btn-muted home-guide-close" aria-label="홈 설정 안내 닫기">×</button>
      <div class="home-guide-kicker">브라우저 홈 설정</div>
      <h3 class="home-guide-title">브라우저를 켜면 이 페이지가 열리게 할 수 있어요</h3>
      <p id="homeGuideDescription" class="home-guide-copy"></p>
      <ol id="homeGuideSteps" class="home-guide-steps"></ol>
      <label class="field home-guide-field">
        <span>시작페이지 주소</span>
        <div class="home-guide-url-row">
          <input id="homeGuideUrl" type="text" readonly />
          <button id="copyHomeUrlBtn" type="button" class="btn btn-primary home-guide-copy-btn">주소 복사</button>
        </div>
      </label>
      <div id="homeGuideToast" class="home-guide-toast" aria-live="polite"></div>
    </div>
  </div>

  <script src="./app/runtime.js"></script>
</body>
</html>
